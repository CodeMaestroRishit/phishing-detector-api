name: Keep API Awake

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          curl -X GET https://phishing-detector-api-1.onrender.com/ \
          --max-time 45 \
          --connect-timeout 10 \
          -f || true
      
      - name: Log attempt
        run: echo "✅ Ping attempt at $(date)"
